backend:
  name: github
  repo: JDONATE38/siempredivinas-web 
  branch: main
  base_url: https://siempredivinas.com
  auth_endpoint: api/auth 

media_folder: "public/img"
public_folder: "/img"
locale: "es"

collections:
  # 1. COLECCIÓN CATEGORÍAS (Padres)
  - name: "categorias"
    label: "📁 Categorías del Catálogo"
    folder: "src/content/categorias"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nombre para Menús", name: "title", widget: "string", hint: "Nombre corto. Ej: Vestidos"}
      - {label: "Título de la Página", name: "pageTitle", widget: "string", hint: "Título largo. Ej: Colección de Vestidos de Fiesta", required: false}
      - {label: "Descripción", name: "description", widget: "text", hint: "Texto que sale arriba en la página."}
      - {label: "Orden de aparición (1, 2, 3...)", name: "order", widget: "number", default: 1}
      - {label: "SEO: Meta Título (Opcional)", name: "seoTitle", widget: "string", required: false}
      - {label: "SEO: Meta Descripción (Opcional)", name: "seoDescription", widget: "text", required: false}
  
  # 2. COLECCIÓN SUBCATEGORÍAS (Hijas)
  - name: "subcategorias"
    label: "📂 Subcategorías"
    folder: "src/content/subcategorias"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nombre para Menús", name: "title", widget: "string", hint: "Ej: Vestidos Largos"}
      - {label: "Título de la Página", name: "pageTitle", widget: "string", required: false}
      - {label: "Descripción", name: "description", widget: "text"}
      
      # VINCULACIÓN MÚLTIPLE: Puede pertenecer a varias categorías padres
      - label: "Categorías Principales (Padres)"
        name: "parentCategory"
        widget: "relation"
        collection: "categorias"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        multiple: true
        required: false
        hint: "Elige una o varias categorías donde aparecerá esta subsección."

      - {label: "Orden de aparición", name: "order", widget: "number", default: 1}
      - {label: "SEO: Meta Título (Opcional)", name: "seoTitle", widget: "string", required: false}
      - {label: "SEO: Meta Descripción (Opcional)", name: "seoDescription", widget: "text", required: false}

  # 3. COLECCIÓN PRODUCTOS
  - name: "productos"
    label: "👗 Productos"
    folder: "src/content/productos"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nombre Producto", name: "title", widget: "string"}
      
      # NUEVO: Título de página específico para el producto
      - {label: "Título de la Página (H1)", name: "pageTitle", widget: "string", required: false, hint: "Opcional. Si lo dejas vacío, usará el Nombre del Producto."}
      
      - {label: "Precio (€)", name: "price", widget: "number", value_type: "float"}
      
      # VINCULACIÓN 1: Categoría General (Múltiple y Opcional)
      - label: "Categorías"
        name: "category"
        widget: "relation"
        collection: "categorias"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        multiple: true
        required: false
        hint: "Selecciona todas las categorías donde quieres que salga el producto."

      # VINCULACIÓN 2: Subcategoría (Múltiple y Opcional)
      - label: "Subcategorías"
        name: "subcategory"
        widget: "relation"
        collection: "subcategorias"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        multiple: true
        required: false
        hint: "Selecciona todas las subcategorías donde quieres que salga."

      - {label: "Estado del Stock", name: "stockStatus", widget: "select", options: ["En Stock", "Últimas Unidades", "Agotado"], default: "En Stock"}
      - {label: "Imagen Principal", name: "image", widget: "image"}
      - {label: "Foto Auxiliar 1 (Opcional)", name: "gallery1", widget: "image", required: false}
      - {label: "Foto Auxiliar 2 (Opcional)", name: "gallery2", widget: "image", required: false}
      - {label: "Foto Auxiliar 3 (Opcional)", name: "gallery3", widget: "image", required: false}
      
      # --- TALLAS Y COLORES ---
      - {label: "Tallas", name: "sizes", widget: "string", required: false, hint: "Escribe las tallas separadas por comas. Ej: S, M, L, Única, 42"}
      
      - {label: "Colores", name: "colors", widget: "string", required: false, hint: "Escribe los colores separados por comas. Ej: Rojo, Negro, Estampado Floral"}
      
      - {label: "Descripción", name: "description", widget: "text"}
      
      # --- SEO ---
      - {label: "SEO: Título Google", name: "seoTitle", widget: "string", required: false}
      - {label: "SEO: Descripción Google", name: "seoDescription", widget: "text", required: false}

      - {label: "Ocultar (Borrador)", name: "draft", widget: "boolean", default: false}
